name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'rsky-pds/**'
      - 'rsky-relay/**'
      - 'rsky-feedgen/**'
      - 'rsky-labeler/**'
      - 'rsky-jetstream-subscriber/**'
      - 'rsky-wintermute/**'
      - 'rsky-appview/**'
      - 'rsky-common/**'
      - 'rsky-lexicon/**'
      - 'rsky-repo/**'
      - 'rsky-firehose/**'
      - 'rsky-identity/**'
      - 'rsky-crypto/**'
      - 'rsky-syntax/**'
      - 'web-client/**'
      - 'Dockerfile.web-client'
      - 'Cargo.lock'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GKE_CLUSTER: client-cluster
  GKE_REGION: us-central1
  REGISTRY: ghcr.io/know-me-tools

jobs:
  # ── Detect changed paths via git diff (reliable for all push types) ─────────
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      pds: ${{ steps.filter.outputs.pds }}
      relay: ${{ steps.filter.outputs.relay }}
      feedgen: ${{ steps.filter.outputs.feedgen }}
      labeler: ${{ steps.filter.outputs.labeler }}
      jetstream: ${{ steps.filter.outputs.jetstream }}
      wintermute: ${{ steps.filter.outputs.wintermute }}
      appview: ${{ steps.filter.outputs.appview }}
      web_client: ${{ steps.filter.outputs.web_client }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pds:
              - 'rsky-pds/**'
              - 'rsky-common/**'
              - 'rsky-lexicon/**'
              - 'rsky-repo/**'
              - 'rsky-crypto/**'
              - 'rsky-syntax/**'
              - 'rsky-identity/**'
              - 'Cargo.lock'
            relay:
              - 'rsky-relay/**'
              - 'rsky-common/**'
              - 'rsky-firehose/**'
              - 'Cargo.lock'
            feedgen:
              - 'rsky-feedgen/**'
              - 'rsky-common/**'
              - 'rsky-lexicon/**'
              - 'Cargo.lock'
            labeler:
              - 'rsky-labeler/**'
              - 'rsky-common/**'
              - 'Cargo.lock'
            jetstream:
              - 'rsky-jetstream-subscriber/**'
              - 'Cargo.lock'
            wintermute:
              - 'rsky-wintermute/**'
              - 'rsky-common/**'
              - 'rsky-identity/**'
              - 'rsky-repo/**'
              - 'Cargo.lock'
            appview:
              - 'rsky-appview/**'
              - 'rsky-common/**'
              - 'rsky-lexicon/**'
              - 'rsky-repo/**'
              - 'rsky-firehose/**'
              - 'Cargo.lock'
            web_client:
              - 'web-client/**'
              - 'Dockerfile.web-client'
              - '.github/workflows/deploy.yml'

  # ── Build images in parallel ────────────────────────────────────────────────
  build-pds:
    name: Build rsky-pds
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.pds == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rsky-pds
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-pds/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-pds
          cache-to: type=gha,mode=max,scope=rsky-pds

  build-relay:
    name: Build rsky-relay
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.relay == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rsky-relay
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-relay
          cache-to: type=gha,mode=max,scope=rsky-relay

  build-feedgen:
    name: Build rsky-feedgen
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.feedgen == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rsky-feedgen
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-feedgen/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-feedgen
          cache-to: type=gha,mode=max,scope=rsky-feedgen

  build-labeler:
    name: Build rsky-labeler
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.labeler == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rsky-labeler
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-labeler/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-labeler
          cache-to: type=gha,mode=max,scope=rsky-labeler

  build-jetstream:
    name: Build rsky-jetstream-subscriber
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.jetstream == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rsky-jetstream-subscriber
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-jetstream-subscriber/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-jetstream-subscriber
          cache-to: type=gha,mode=max,scope=rsky-jetstream-subscriber

  build-wintermute:
    name: Build rsky-wintermute
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.wintermute == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rsky-wintermute
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-wintermute/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-wintermute
          cache-to: type=gha,mode=max,scope=rsky-wintermute

  build-appview:
    name: Build rsky-appview
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.appview == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rsky-appview
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-appview/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-appview
          cache-to: type=gha,mode=max,scope=rsky-appview

  build-web-client:
    name: Build web-client
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web_client == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/web-client
          tags: |
            type=sha,prefix=,format=short,priority=1000
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web-client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web-client
          cache-to: type=gha,mode=max,scope=web-client
          build-args: |
            NEXT_PUBLIC_ATP_SERVICE_URL=https://pds.know-me.tools
            NEXT_PUBLIC_ATP_APPVIEW_URL=https://appview.know-me.tools

  # ── Deploy all services to GKE ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-pds
      - build-relay
      - build-feedgen
      - build-labeler
      - build-jetstream
      - build-wintermute
      - build-appview
      - build-web-client
    # Run deploy even if some build jobs were skipped (path-filtered)
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ secrets.GKE_PROJECT_ID }}

      # ── Namespace ─────────────────────────────────────────────────────────
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ── GHCR pull secret ─────────────────────────────────────────────────
      - name: Create GHCR image pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace atproto \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── StorageClass ─────────────────────────────────────────────────────
      - name: Apply StorageClass
        run: kubectl apply -f k8s/postgresql/storageclass.yaml

      # ── Secrets (envsubst fills ${VAR} placeholders) ──────────────────────
      - name: Substitute and apply secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          PDS_ADMIN_PASS: ${{ secrets.PDS_ADMIN_PASS }}
          PDS_JWT_KEY_K256_PRIVATE_KEY_HEX: ${{ secrets.PDS_JWT_KEY_K256_PRIVATE_KEY_HEX }}
          PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: ${{ secrets.PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX }}
          PDS_REPO_SIGNING_KEY_K256_PRIVATE_KEY_HEX: ${{ secrets.PDS_REPO_SIGNING_KEY_K256_PRIVATE_KEY_HEX }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GCS_HMAC_ACCESS_KEY: ${{ secrets.GCS_HMAC_ACCESS_KEY }}
          GCS_HMAC_SECRET_KEY: ${{ secrets.GCS_HMAC_SECRET_KEY }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          RELAY_ADMIN_PASSWORD: ${{ secrets.RELAY_ADMIN_PASSWORD }}
          RELAY_PG_USER: ${{ secrets.RELAY_PG_USER }}
          RELAY_PG_PASSWORD: ${{ secrets.RELAY_PG_PASSWORD }}
          RSKY_API_KEY: ${{ secrets.RSKY_API_KEY }}
          MOD_SERVICE_DID: ${{ secrets.MOD_SERVICE_DID }}
          MOD_SERVICE_EMAIL: ${{ secrets.MOD_SERVICE_EMAIL }}
          MOD_SERVICE_PASSWORD: ${{ secrets.MOD_SERVICE_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          WINTERMUTE_RELAY_HOSTS: ${{ secrets.WINTERMUTE_RELAY_HOSTS }}
          APPVIEW_RELAY_HOSTS: ${{ secrets.APPVIEW_RELAY_HOSTS }}
        run: |
          envsubst < k8s/postgresql/secret.yaml              | kubectl apply -f -
          envsubst < k8s/rsky-pds/secret.yaml                | kubectl apply -f -
          envsubst < k8s/rsky-relay/secret.yaml              | kubectl apply -f -
          envsubst < k8s/rsky-feedgen/secret.yaml            | kubectl apply -f -
          envsubst < k8s/rsky-labeler/secret.yaml            | kubectl apply -f -
          envsubst < k8s/rsky-jetstream-subscriber/secret.yaml | kubectl apply -f -
          envsubst < k8s/rsky-wintermute/secret.yaml         | kubectl apply -f -
          envsubst < k8s/rsky-appview/secret.yaml            | kubectl apply -f -
          envsubst < k8s/web-client/secret.yaml              | kubectl apply -f -

      # ── PostgreSQL ────────────────────────────────────────────────────────
      - name: Apply PostgreSQL manifests
        run: |
          kubectl apply -f k8s/postgresql/initdb-configmap.yaml
          kubectl apply -f k8s/postgresql/service.yaml
          kubectl apply -f k8s/postgresql/statefulset.yaml

      - name: Wait for PostgreSQL ready
        run: |
          kubectl rollout status statefulset/postgresql \
            -n atproto --timeout=300s

      # ── pgbouncer ─────────────────────────────────────────────────────────
      - name: Apply pgbouncer manifests
        run: |
          kubectl apply -f k8s/pgbouncer/configmap.yaml
          kubectl apply -f k8s/pgbouncer/secret.yaml
          kubectl apply -f k8s/pgbouncer/service.yaml
          kubectl apply -f k8s/pgbouncer/deployment.yaml

      - name: Wait for pgbouncer ready
        run: |
          kubectl rollout status deployment/pgbouncer \
            -n atproto --timeout=120s

      # ── rsky-pds ─────────────────────────────────────────────────────────
      - name: Apply rsky-pds manifests
        run: |
          kubectl apply -f k8s/rsky-pds/configmap.yaml
          kubectl apply -f k8s/rsky-pds/service.yaml
          kubectl apply -f k8s/rsky-pds/gateway.yaml
          kubectl apply -f k8s/rsky-pds/certificate.yaml
          kubectl apply -f k8s/rsky-pds/httproute-https.yaml
          kubectl apply -f k8s/rsky-pds/httproute-redirect.yaml
          kubectl apply -f k8s/rsky-pds/httproute-handles.yaml

      # Only apply statefulset/deployment when the corresponding build ran.
      # The SHA-based image tag change is what triggers Kubernetes to roll out
      # new pods — no manual rollout restart needed.
      - name: Deploy rsky-pds StatefulSet
        if: needs.build-pds.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-pds.outputs.image_tag }}|g" \
            k8s/rsky-pds/statefulset.yaml | kubectl apply -f -

      # ── rsky-relay-postgres ───────────────────────────────────────────────
      # Dedicated PostgreSQL for relay (isolated from main postgresql-0).
      # Uses LISTEN/NOTIFY for real-time ban/cursor updates.
      - name: Apply rsky-relay-postgres manifests
        run: |
          kubectl apply -f k8s/rsky-relay/postgres-statefulset.yaml

      - name: Wait for rsky-relay-postgres ready
        run: |
          kubectl rollout status statefulset/rsky-relay-postgres \
            -n atproto --timeout=300s

      # ── rsky-relay ────────────────────────────────────────────────────────
      - name: Apply rsky-relay manifests
        run: |
          kubectl apply -f k8s/rsky-relay/service.yaml
          kubectl apply -f k8s/rsky-relay/gateway.yaml
          kubectl apply -f k8s/rsky-relay/certificate.yaml
          kubectl apply -f k8s/rsky-relay/httproute-https.yaml
          kubectl apply -f k8s/rsky-relay/httproute-redirect.yaml

      - name: Deploy rsky-relay StatefulSet
        if: needs.build-relay.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-relay.outputs.image_tag }}|g" \
            k8s/rsky-relay/statefulset.yaml | kubectl apply -f -

      # ── rsky-feedgen ──────────────────────────────────────────────────────
      - name: Apply rsky-feedgen manifests
        run: |
          kubectl apply -f k8s/rsky-feedgen/configmap.yaml
          kubectl apply -f k8s/rsky-feedgen/service.yaml
          kubectl apply -f k8s/rsky-feedgen/gateway.yaml
          kubectl apply -f k8s/rsky-feedgen/certificate.yaml
          kubectl apply -f k8s/rsky-feedgen/httproute-https.yaml
          kubectl apply -f k8s/rsky-feedgen/httproute-redirect.yaml

      - name: Deploy rsky-feedgen Deployment
        if: needs.build-feedgen.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-feedgen.outputs.image_tag }}|g" \
            k8s/rsky-feedgen/deployment.yaml | kubectl apply -f -

      # ── rsky-labeler ──────────────────────────────────────────────────────
      - name: Apply rsky-labeler manifests
        run: |
          kubectl apply -f k8s/rsky-labeler/configmap.yaml

      - name: Deploy rsky-labeler Deployment
        if: needs.build-labeler.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-labeler.outputs.image_tag }}|g" \
            k8s/rsky-labeler/deployment.yaml | kubectl apply -f -

      # ── rsky-jetstream-subscriber ─────────────────────────────────────────
      - name: Apply rsky-jetstream-subscriber manifests
        run: |
          kubectl apply -f k8s/rsky-jetstream-subscriber/configmap.yaml

      - name: Deploy rsky-jetstream-subscriber Deployment
        if: needs.build-jetstream.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-jetstream.outputs.image_tag }}|g" \
            k8s/rsky-jetstream-subscriber/deployment.yaml | kubectl apply -f -

      # ── rsky-wintermute ───────────────────────────────────────────────────
      - name: Apply rsky-wintermute manifests
        run: |
          kubectl apply -f k8s/rsky-wintermute/service.yaml

      - name: Deploy rsky-wintermute StatefulSet
        if: needs.build-wintermute.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-wintermute.outputs.image_tag }}|g" \
            k8s/rsky-wintermute/statefulset.yaml | kubectl apply -f -

      # ── rsky-appview ──────────────────────────────────────────────────────
      - name: Apply rsky-appview manifests
        run: |
          kubectl apply --server-side --force-conflicts -f k8s/clusterissuer.yaml
          kubectl apply -f k8s/rsky-appview/service.yaml
          kubectl apply -f k8s/rsky-appview/gateway.yaml
          kubectl apply -f k8s/rsky-appview/certificate.yaml
          kubectl apply -f k8s/rsky-appview/httproute-https.yaml
          kubectl apply -f k8s/rsky-appview/httproute-redirect.yaml

      - name: Deploy rsky-appview StatefulSet
        if: needs.build-appview.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-appview.outputs.image_tag }}|g" \
            k8s/rsky-appview/statefulset.yaml | kubectl apply -f -

      # ── web-client ────────────────────────────────────────────────────────
      - name: Apply web-client manifests
        run: |
          kubectl apply -f k8s/web-client/configmap.yaml
          kubectl apply -f k8s/web-client/service.yaml
          kubectl apply -f k8s/web-client/gateway.yaml
          kubectl apply -f k8s/web-client/certificate.yaml
          kubectl apply -f k8s/web-client/httproute-https.yaml
          kubectl apply -f k8s/web-client/httproute-redirect.yaml

      - name: Deploy web-client Deployment
        if: needs.build-web-client.result == 'success'
        run: |
          sed "s|IMAGE_TAG|${{ needs.build-web-client.outputs.image_tag }}|g" \
            k8s/web-client/deployment.yaml | kubectl apply -f -

      # ── Observability ─────────────────────────────────────────────────────
      - name: Apply monitoring manifests
        run: |
          kubectl apply -f k8s/rsky-relay/podmonitoring.yaml
          kubectl apply -f k8s/rsky-appview/podmonitoring.yaml
          kubectl apply -f k8s/monitoring/alerting-rules.yaml

      # ── Rollout waits ─────────────────────────────────────────────────────
      - name: Wait for rollouts
        run: |
          kubectl rollout status statefulset/rsky-pds \
            -n atproto --timeout=600s
          kubectl rollout status statefulset/rsky-relay \
            -n atproto --timeout=600s
          kubectl rollout status deployment/rsky-feedgen \
            -n atproto --timeout=300s
          kubectl rollout status deployment/rsky-labeler \
            -n atproto --timeout=300s
          kubectl rollout status deployment/rsky-jetstream-subscriber \
            -n atproto --timeout=300s
          kubectl rollout status statefulset/rsky-wintermute \
            -n atproto --timeout=600s
          kubectl rollout status statefulset/rsky-appview \
            -n atproto --timeout=600s
          kubectl rollout status deployment/web-client \
            -n atproto --timeout=300s

      # ── Debug on failure ──────────────────────────────────────────────────
      - name: Debug pod state
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n atproto -o wide
          echo "=== Events ==="
          kubectl get events -n atproto --sort-by='.lastTimestamp' | tail -40

      # ── Print Gateway IPs for DNS ─────────────────────────────────────────
      - name: Print Gateway IPs
        run: |
          echo "=== Gateway LoadBalancer IPs ==="
          kubectl get gateway -n atproto \
            -o custom-columns='NAME:.metadata.name,IP:.status.addresses[0].value'
          echo ""
          echo "DNS A records needed:"
          echo "  pds.know-me.tools     → IP of pds-gateway"
          echo "  relay.know-me.tools   → IP of relay-gateway"
          echo "  feed.know-me.tools    → IP of feedgen-gateway"
          echo "  appview.know-me.tools → IP of appview-gateway"
          echo "  social.know-me.tools  → IP of web-client-gateway"
