name: Build rsky-jetstream-subscriber

on:
  push:
    branches: [main]
    paths:
      - 'rsky-jetstream-subscriber/**'
      - 'rsky-common/**'
      - 'rsky-crypto/**'
      - 'rsky-syntax/**'
      - 'rsky-identity/**'
      - 'rsky-lexicon/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-rsky-jetstream-subscriber.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/know-me-tools/rsky-jetstream-subscriber

jobs:
  build:
    name: Build rsky-jetstream-subscriber
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: rsky-jetstream-subscriber/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rsky-jetstream-subscriber
          cache-to: type=gha,mode=max,scope=rsky-jetstream-subscriber
