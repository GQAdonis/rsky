name: Deploy to GKE

on:
  workflow_run:
    workflows:
      - "Build web-client"
      - "Build rsky-pds"
      - "Build rsky-relay"
      - "Build rsky-feedgen"
      - "Build rsky-labeler"
      - "Build rsky-jetstream-subscriber"
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated services to deploy (e.g. web-client,rsky-relay) or "all"'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io/know-me-tools
  GKE_CLUSTER: client-cluster
  GKE_REGION: us-central1

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    # On workflow_run: only deploy if the triggering build succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine which service to deploy
        id: service
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "services=${{ github.event.inputs.services }}" >> $GITHUB_OUTPUT
          else
            WORKFLOW="${{ github.event.workflow_run.name }}"
            case "$WORKFLOW" in
              "Build web-client")                  SVC="web-client" ;;
              "Build rsky-pds")                    SVC="rsky-pds" ;;
              "Build rsky-relay")                  SVC="rsky-relay" ;;
              "Build rsky-feedgen")                SVC="rsky-feedgen" ;;
              "Build rsky-labeler")                SVC="rsky-labeler" ;;
              "Build rsky-jetstream-subscriber")   SVC="rsky-jetstream-subscriber" ;;
              *)                                   SVC="all" ;;
            esac
            echo "services=$SVC" >> $GITHUB_OUTPUT
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          else
            echo "sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}
          project_id: ${{ secrets.GKE_PROJECT_ID }}

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace atproto \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply StorageClass
        run: kubectl apply -f k8s/postgresql/storageclass.yaml

      - name: Apply k8s manifests (infrastructure + targeted service only)
        run: |
          SVCS=${{ steps.service.outputs.services }}

          # Always apply shared infrastructure (no image fields)
          kubectl apply -f k8s/postgresql/configmap.yaml 2>/dev/null || true
          kubectl apply -f k8s/postgresql/service.yaml   2>/dev/null || true
          kubectl apply -f k8s/postgresql/statefulset.yaml 2>/dev/null || true

          apply_service_manifests() {
            local dir="k8s/$1"
            find "$dir" -name "*.yaml" ! -name "secret.yaml" \
              | sort | xargs -I{} kubectl apply -f {}
          }

          if [ "$SVCS" = "all" ]; then
            for svc in rsky-pds rsky-relay rsky-feedgen rsky-labeler rsky-jetstream-subscriber web-client; do
              apply_service_manifests "$svc"
            done
          else
            IFS=',' read -ra LIST <<< "$SVCS"
            for svc in "${LIST[@]}"; do
              apply_service_manifests "$(echo $svc | xargs)"
            done
          fi

      - name: Inject secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PDS_ADMIN_PASS: ${{ secrets.PDS_ADMIN_PASS }}
          PDS_JWT_KEY_K256_PRIVATE_KEY_HEX: ${{ secrets.PDS_JWT_KEY_K256_PRIVATE_KEY_HEX }}
          PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: ${{ secrets.PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX }}
          PDS_REPO_SIGNING_KEY_K256_PRIVATE_KEY_HEX: ${{ secrets.PDS_REPO_SIGNING_KEY_K256_PRIVATE_KEY_HEX }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GCS_HMAC_ACCESS_KEY: ${{ secrets.GCS_HMAC_ACCESS_KEY }}
          GCS_HMAC_SECRET_KEY: ${{ secrets.GCS_HMAC_SECRET_KEY }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          RELAY_ADMIN_PASSWORD: ${{ secrets.RELAY_ADMIN_PASSWORD }}
          RSKY_API_KEY: ${{ secrets.RSKY_API_KEY }}
          MOD_SERVICE_DID: ${{ secrets.MOD_SERVICE_DID }}
          MOD_SERVICE_EMAIL: ${{ secrets.MOD_SERVICE_EMAIL }}
          MOD_SERVICE_PASSWORD: ${{ secrets.MOD_SERVICE_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        run: |
          envsubst < k8s/postgresql/secret.yaml | kubectl apply -f -
          envsubst < k8s/rsky-pds/secret.yaml | kubectl apply -f -
          envsubst < k8s/rsky-relay/secret.yaml | kubectl apply -f -
          envsubst < k8s/rsky-feedgen/secret.yaml | kubectl apply -f -
          envsubst < k8s/rsky-labeler/secret.yaml | kubectl apply -f -
          envsubst < k8s/rsky-jetstream-subscriber/secret.yaml | kubectl apply -f -
          envsubst < k8s/web-client/secret.yaml | kubectl apply -f -

      - name: Update image tag(s) on workloads
        run: |
          SHA=${{ steps.service.outputs.sha }}
          SVCS=${{ steps.service.outputs.services }}
          REG="${{ env.REGISTRY }}"

          deploy_service() {
            case "$1" in
              rsky-pds)
                kubectl set image statefulset/rsky-pds rsky-pds=$REG/rsky-pds:$SHA -n atproto ;;
              rsky-relay)
                kubectl set image statefulset/rsky-relay rsky-relay=$REG/rsky-relay:$SHA -n atproto ;;
              rsky-feedgen)
                kubectl set image deployment/rsky-feedgen rsky-feedgen=$REG/rsky-feedgen:$SHA -n atproto ;;
              rsky-labeler)
                kubectl set image deployment/rsky-labeler rsky-labeler=$REG/rsky-labeler:$SHA -n atproto ;;
              rsky-jetstream-subscriber)
                kubectl set image deployment/rsky-jetstream-subscriber \
                  rsky-jetstream-subscriber=$REG/rsky-jetstream-subscriber:$SHA -n atproto ;;
              web-client)
                kubectl set image deployment/web-client web-client=$REG/web-client:$SHA -n atproto ;;
            esac
          }

          if [ "$SVCS" = "all" ]; then
            for svc in rsky-pds rsky-relay rsky-feedgen rsky-labeler rsky-jetstream-subscriber web-client; do
              deploy_service "$svc"
            done
          else
            IFS=',' read -ra LIST <<< "$SVCS"
            for svc in "${LIST[@]}"; do
              deploy_service "$(echo $svc | xargs)"
            done
          fi

      - name: Wait for rollout(s)
        run: |
          SVCS=${{ steps.service.outputs.services }}

          rollout_service() {
            case "$1" in
              rsky-pds)      kubectl rollout status statefulset/rsky-pds -n atproto --timeout=180s ;;
              rsky-relay)    kubectl rollout status statefulset/rsky-relay -n atproto --timeout=180s ;;
              rsky-feedgen)  kubectl rollout status deployment/rsky-feedgen -n atproto --timeout=120s ;;
              rsky-labeler)  kubectl rollout status deployment/rsky-labeler -n atproto --timeout=120s ;;
              rsky-jetstream-subscriber)
                kubectl rollout status deployment/rsky-jetstream-subscriber -n atproto --timeout=120s ;;
              web-client)    kubectl rollout status deployment/web-client -n atproto --timeout=120s ;;
            esac
          }

          if [ "$SVCS" = "all" ]; then
            for svc in rsky-pds rsky-relay rsky-feedgen rsky-labeler rsky-jetstream-subscriber web-client; do
              rollout_service "$svc"
            done
          else
            IFS=',' read -ra LIST <<< "$SVCS"
            for svc in "${LIST[@]}"; do
              rollout_service "$(echo $svc | xargs)"
            done
          fi

      - name: Deployment summary
        run: |
          echo "=== Deployed ${{ steps.service.outputs.services }} @ ${{ steps.service.outputs.sha }} ==="
          kubectl get pods -n atproto
