name: Build web-client

on:
  push:
    branches: [main]
    paths:
      - 'web-client/**'
      - 'Dockerfile.web-client'
      - '.github/workflows/build-web-client.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/know-me-tools
  IMAGE: ghcr.io/know-me-tools/web-client

jobs:
  build:
    name: Build web-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web-client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web-client-v2
          cache-to: type=gha,mode=max,scope=web-client-v2
          build-args: |
            NEXT_PUBLIC_ATP_SERVICE_URL=https://pds.know-me.tools
            NEXT_PUBLIC_ATP_APPVIEW_URL=https://api.bsky.app
