apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rsky-wintermute-https
  namespace: atproto
spec:
  parentRefs:
    - name: appview-gateway
      sectionName: https
  hostnames:
    - appview.know-me.tools
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rsky-wintermute
          port: 9090
