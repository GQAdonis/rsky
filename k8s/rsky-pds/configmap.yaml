  PDS_SERVICE_DID: "did:web:pds.know-me.tools"
  PDS_SERVICE_HANDLE_DOMAINS: ".know-me.tools"
  PDS_EMAIL_FROM_ADDRESS: "noreply@know-me.tools"
  PDS_EMAIL_FROM_NAME: "know-me.tools"
  PDS_CRAWLERS: "https://bsky.network"
  ROCKET_PORT: "3000"
