apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: pds-gateway
  namespace: atproto
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: pds.know-me.tools
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-know-me-tools-tls
            kind: Secret
    - name: http
      protocol: HTTP
      port: 80
      hostname: pds.know-me.tools
    - name: handles-https
      protocol: HTTPS
      port: 443
      hostname: "*.know-me.tools"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-know-me-tools-tls
            kind: Secret
    - name: handles-http
      protocol: HTTP
      port: 80
      hostname: "*.know-me.tools"
