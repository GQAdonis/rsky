apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rsky-pds-handles-https
  namespace: atproto
spec:
  parentRefs:
    - name: pds-gateway
      sectionName: handles-https
  hostnames:
    - "*.know-me.tools"
  rules:
    - matches:
        - path:
            type: Exact
            value: /.well-known/atproto-did
      backendRefs:
        - name: rsky-pds
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rsky-pds-handles-http-redirect
  namespace: atproto
spec:
  parentRefs:
    - name: pds-gateway
      sectionName: handles-http
  hostnames:
    - "*.know-me.tools"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
