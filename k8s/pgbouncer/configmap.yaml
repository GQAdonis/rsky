apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: atproto
data:
  pgbouncer.ini: |
    [databases]
    rsky = host=postgresql port=5432 dbname=rsky pool_size=60
    rsky_feedgen = host=postgresql port=5432 dbname=rsky_feedgen pool_size=20

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 500
    default_pool_size = 20
    server_idle_timeout = 60
    server_connect_timeout = 10
    client_idle_timeout = 0
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    stats_period = 60
    ignore_startup_parameters = extra_float_digits
    query_wait_timeout = 30
