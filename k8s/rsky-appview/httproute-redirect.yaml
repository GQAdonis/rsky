apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rsky-appview-http-redirect
  namespace: atproto
spec:
  parentRefs:
    - name: appview-gateway
      sectionName: http
  hostnames:
    - appview.know-me.tools
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
