---
# App-level secrets for rsky-relay (injected as environment variables).
apiVersion: v1
kind: Secret
metadata:
  name: rsky-relay-secrets
  namespace: atproto
type: Opaque
stringData:
  RELAY_ADMIN_PASSWORD: "${RELAY_ADMIN_PASSWORD}"
  RELAY_LENIENT_VALIDATION: "true"
  RELAY_METRICS_LISTEN: "0.0.0.0:9090"
  RELAY_DISCOVERY_UPSTREAMS: "relay1.us-west.bsky.network,relay1.us-east.bsky.network,bsky.network"
  DATABASE_URL: "postgres://${RELAY_PG_USER}:${RELAY_PG_PASSWORD}@rsky-relay-postgres:5432/rsky_relay"
---
# Credentials for the dedicated rsky-relay PostgreSQL instance.
# Separate from the main postgresql-0 credentials.
apiVersion: v1
kind: Secret
metadata:
  name: rsky-relay-postgres-credentials
  namespace: atproto
type: Opaque
stringData:
  username: "${RELAY_PG_USER}"
  password: "${RELAY_PG_PASSWORD}"
