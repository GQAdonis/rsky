apiVersion: v1
kind: Secret
metadata:
  name: rsky-relay-secrets
  namespace: atproto
type: Opaque
stringData:
  RELAY_ADMIN_PASSWORD: "${RELAY_ADMIN_PASSWORD}"
  RELAY_LENIENT_VALIDATION: "true"
  RELAY_METRICS_LISTEN: "0.0.0.0:9090"
  RELAY_DISCOVERY_UPSTREAMS: "relay1.us-west.bsky.network,relay1.us-east.bsky.network,bsky.network"
