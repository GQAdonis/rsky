apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rsky-relay-http-redirect
  namespace: atproto
spec:
  parentRefs:
    - name: relay-gateway
      sectionName: http
  hostnames:
    - relay.know-me.tools
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
